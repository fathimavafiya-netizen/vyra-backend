version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: vyra_postgres
    restart: always
    ports:
      - '5432:5432'
    environment:
      POSTGRES_USER: vyra_user
      POSTGRES_PASSWORD: vyra_password
      POSTGRES_DB: vyra_db
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: vyra_redis
    restart: always
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data

  pgadmin:
    image: dpage/pgadmin4
    container_name: vyra_pgadmin
    restart: always
    ports:
      - '5050:80'
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@vyra.com
      PGADMIN_DEFAULT_PASSWORD: admin_password
    depends_on:
      - postgres

volumes:
  postgres_data:
  redis_data:
